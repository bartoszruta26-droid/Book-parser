name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          g++ \
          cmake \
          make \
          git \
          curl \
          wget \
          python3 \
          python3-pip \
          python3-venv \
          libreoffice \
          poppler-utils \
          pandoc \
          libcurl4-openssl-dev \
          nlohmann-json3-dev \
          shellcheck
    
    - name: Install Python dependencies
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Compile C++ tools
      run: |
        make all
    
    - name: Run tests
      run: |
        make test
        make test-mempalace
        make test-expander
        make test-docgenerator
    
    - name: Check Bash scripts
      run: |
        shellcheck run_pipeline.sh
        shellcheck orchestrator.sh
        shellcheck save_results.sh
    
    - name: Verify installation
      run: |
        ./run_pipeline.sh --help
        ./chunker --help
        ./mempalace_client --help
        ./ollama_expander --help
        ./doc_generator --help
